name: Build POT System ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-utils \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            git

      - name: Configure live-build
        run: |
          mkdir -p build && cd build
          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --memtest none \
            --iso-volume "POT-SYSTEM-1.0" \
            --iso-publisher "POT System Project" \
            --iso-application "POT System - PC Router OS"

      - name: Copy package lists
        run: |
          mkdir -p build/config/package-lists
          cp config/packages.list.chroot build/config/package-lists/pot-system.list.chroot

      - name: Copy hooks (post-install scripts)
        run: |
          mkdir -p build/config/hooks/live
          cp -r config/hooks/* build/config/hooks/live/

      - name: Copy POT System web UI and services
        run: |
          mkdir -p build/config/includes.chroot/opt/pot-system
          cp -r pot-system/* build/config/includes.chroot/opt/pot-system/
          cp -r services/ build/config/includes.chroot/opt/pot-system/services/
          cp -r config/systemd/ build/config/includes.chroot/etc/systemd/system/

      - name: Build ISO
        run: |
          cd build
          sudo lb build 2>&1 | tee ../build.log

      - name: Rename ISO
        run: |
          cd build
          ISO_NAME="pot-system-1.0-$(date +%Y%m%d)-amd64.iso"
          mv live-image-amd64.hybrid.iso "../${ISO_NAME}"
          echo "ISO_NAME=${ISO_NAME}" >> $GITHUB_ENV
          sha256sum "../${ISO_NAME}" > "../${ISO_NAME}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: pot-system-iso
          path: |
            *.iso
            *.sha256
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.iso
            *.sha256
          body: |
            ## POT System ${{ github.ref_name }}

            ### Flash Instructions (Rufus)
            1. Download the `.iso` file below
            2. Open Rufus → Select your SSD/USB
            3. Select the ISO → Partition: GPT → Target: UEFI
            4. Click START → Write in DD Image mode
            5. Boot from the SSD → POT System will auto-configure

            ### Default Login
            - Web UI: `https://192.168.1.1` (port 443)
            - Username: `admin` / Password: `admin` (change on first login)
            - SSH: `ssh admin@192.168.1.1`

            ### SHA256 Checksum
            See `.sha256` file for integrity verification.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
