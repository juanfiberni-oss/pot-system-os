name: Build POT System ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            git \
            ca-certificates \
            isolinux \
            syslinux-utils \
            gdisk \
            parted

      - name: Build Debian base system
        run: |
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --include=systemd,systemd-sysv,dbus,udev,locales,ca-certificates,apt-utils \
            bookworm \
            /mnt/chroot \
            http://deb.debian.org/debian

      - name: Configure APT sources
        run: |
          sudo tee /mnt/chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          EOF

      - name: Install packages in chroot
        run: |
          sudo chroot /mnt/chroot /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              linux-image-amd64 \
              grub-efi-amd64 \
              efibootmgr \
              live-boot \
              live-boot-initramfs-tools \
              live-config \
              live-config-systemd \
              iproute2 \
              iptables \
              nftables \
              iputils-ping \
              net-tools \
              ethtool \
              bridge-utils \
              ppp \
              pppoe \
              dnsmasq \
              chrony \
              wireguard \
              wireguard-tools \
              openvpn \
              nginx \
              php8.2-fpm \
              php8.2-cli \
              php8.2-sqlite3 \
              php8.2-mbstring \
              sqlite3 \
              openssh-server \
              curl \
              wget \
              git \
              python3 \
              python3-pip \
              cron \
              logrotate \
              rsyslog \
              sudo \
              nano \
              bash-completion \
              usbutils \
              pciutils \
              tcpdump \
              htop \
              vnstat \
              fail2ban \
              frr \
              cmake \
              gcc \
              g++ \
              make \
              libpcre3-dev \
              libssl-dev \
              kea-dhcp4-server \
              firmware-linux \
              firmware-linux-nonfree \
              firmware-realtek \
              firmware-atheros 2>&1 | tail -20
          "

      - name: Copy POT System files into chroot
        run: |
          sudo mkdir -p /mnt/chroot/opt/pot-system/webui
          sudo mkdir -p /mnt/chroot/opt/pot-system/api
          sudo mkdir -p /mnt/chroot/opt/pot-system/scripts
          sudo mkdir -p /mnt/chroot/opt/pot-system/services
          sudo mkdir -p /mnt/chroot/var/lib/pot-system
          sudo mkdir -p /mnt/chroot/etc/pot-system/ssl

          sudo cp -r pot-system/webui/* /mnt/chroot/opt/pot-system/webui/ 2>/dev/null || true
          sudo cp -r pot-system/api/* /mnt/chroot/opt/pot-system/api/ 2>/dev/null || true
          sudo cp -r pot-system/scripts/* /mnt/chroot/opt/pot-system/scripts/ 2>/dev/null || true
          sudo cp -r services/* /mnt/chroot/opt/pot-system/services/ 2>/dev/null || true
          sudo find /mnt/chroot/opt/pot-system -name "*.sh" -exec chmod +x {} \;

      - name: Run configuration hooks in chroot
        run: |
          # Copy hooks into chroot
          sudo cp config/hooks/30-pot-system.hook.chroot /mnt/chroot/tmp/setup.sh
          sudo chmod +x /mnt/chroot/tmp/setup.sh

          # Mount required filesystems
          sudo mount --bind /proc /mnt/chroot/proc
          sudo mount --bind /sys /mnt/chroot/sys
          sudo mount --bind /dev /mnt/chroot/dev
          sudo mount --bind /dev/pts /mnt/chroot/dev/pts

          # Run setup
          sudo chroot /mnt/chroot /bin/bash /tmp/setup.sh || echo "Setup hook completed with warnings"

          # Unmount
          sudo umount /mnt/chroot/dev/pts || true
          sudo umount /mnt/chroot/dev || true
          sudo umount /mnt/chroot/sys || true
          sudo umount /mnt/chroot/proc || true

      - name: Configure bootloader and system
        run: |
          # Set hostname
          echo "pot-router" | sudo tee /mnt/chroot/etc/hostname

          # Set root password
          sudo chroot /mnt/chroot /bin/bash -c "echo 'root:admin' | chpasswd"

          # Create admin user
          sudo chroot /mnt/chroot /bin/bash -c "
            useradd -m -s /bin/bash -G sudo admin 2>/dev/null || true
            echo 'admin:admin' | chpasswd
          "

          # fstab
          sudo tee /mnt/chroot/etc/fstab << 'EOF'
          /dev/sda1  /boot/efi  vfat  defaults  0  2
          /dev/sda2  /          ext4  defaults  0  1
          EOF

          # Network interfaces
          sudo tee /mnt/chroot/etc/network/interfaces << 'EOF'
          auto lo
          iface lo inet loopback

          auto eth0
          iface eth0 inet dhcp

          auto eth1
          iface eth1 inet static
            address 192.168.10.1
            netmask 255.255.255.0
          EOF

      - name: Create squashfs filesystem
        run: |
          sudo mksquashfs /mnt/chroot /tmp/filesystem.squashfs \
            -comp xz \
            -e /mnt/chroot/proc \
            -e /mnt/chroot/sys \
            -e /mnt/chroot/dev \
            -noappend
          ls -lh /tmp/filesystem.squashfs

      - name: Build bootable ISO
        run: |
          # Create ISO directory structure
          mkdir -p /tmp/iso/boot/grub
          mkdir -p /tmp/iso/live
          mkdir -p /tmp/iso/EFI/BOOT

          # Copy squashfs
          cp /tmp/filesystem.squashfs /tmp/iso/live/filesystem.squashfs

          # Copy kernel and initrd from chroot
          KERNEL=$(ls /mnt/chroot/boot/vmlinuz-* 2>/dev/null | head -1)
          INITRD=$(ls /mnt/chroot/boot/initrd.img-* 2>/dev/null | head -1)

          if [ -z "$KERNEL" ] || [ -z "$INITRD" ]; then
            echo "ERROR: Kernel or initrd not found!"
            ls /mnt/chroot/boot/
            exit 1
          fi

          cp "$KERNEL" /tmp/iso/boot/vmlinuz
          cp "$INITRD" /tmp/iso/boot/initrd.img
          echo "Kernel: $KERNEL"
          echo "Initrd: $INITRD"

          # GRUB config - use live boot parameters
          cat > /tmp/iso/boot/grub/grub.cfg << 'GRUB'
          set default=0
          set timeout=5

          menuentry "POT System - PC Router OS" {
            linux /boot/vmlinuz boot=live components quiet splash
            initrd /boot/initrd.img
          }

          menuentry "POT System (Safe Mode / nomodeset)" {
            linux /boot/vmlinuz boot=live components nomodeset
            initrd /boot/initrd.img
          }

          menuentry "POT System (Debug Mode)" {
            linux /boot/vmlinuz boot=live components
            initrd /boot/initrd.img
          }
          GRUB

          # Build ISO with grub-mkrescue
          sudo grub-mkrescue \
            --output=/tmp/pot-system.iso \
            /tmp/iso \
            -- -volid "POT-SYSTEM" 2>&1 | tail -20

          ls -lh /tmp/pot-system.iso

      - name: Package and checksum
        run: |
          ISO_NAME="pot-system-1.0-$(date +%Y%m%d)-amd64.iso"
          cp /tmp/pot-system.iso "./$ISO_NAME"
          sha256sum "./$ISO_NAME" > "./$ISO_NAME.sha256"
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV
          ls -lh "./$ISO_NAME"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: pot-system-iso
          path: |
            *.iso
            *.sha256
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/*.log
          retention-days: 7

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
            *.sha256
          body: |
            ## POT System ${{ github.ref_name }}
            PC-Based Router / Firewall / Billing OS

            ### Flash with Rufus
            1. Download `.iso` below
            2. Rufus → Device: SSD → Select ISO
            3. Partition: **GPT** · Target: **UEFI**
            4. START → **DD Image mode**
            5. Boot → Web UI: `https://192.168.1.1`

            **Login:** admin / admin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
