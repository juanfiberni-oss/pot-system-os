name: Build POT System ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            git \
            ca-certificates \
            isolinux \
            syslinux-utils \
            live-build \
            live-tools

      - name: Build with live-build (proper method)
        run: |
          mkdir -p /tmp/lb
          cd /tmp/lb

          # Initialize live-build config
          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --security false \
            --memtest none \
            --iso-volume "POT-SYSTEM" \
            --iso-application "POT System Router OS" \
            --bootappend-live "boot=live components quiet splash"

          # Package list
          mkdir -p config/package-lists
          cat > config/package-lists/pot.list.chroot << 'PKGS'
          iproute2
          iptables
          nftables
          net-tools
          ethtool
          ppp
          pppoe
          dnsmasq
          chrony
          nginx
          php8.2-fpm
          php8.2-cli
          php8.2-sqlite3
          php8.2-mbstring
          sqlite3
          openssh-server
          curl
          wget
          sudo
          nano
          bash-completion
          usbutils
          pciutils
          tcpdump
          htop
          fail2ban
          frr
          firmware-linux
          firmware-linux-nonfree
          firmware-realtek
          firmware-atheros
          PKGS

          # Copy POT System files
          mkdir -p config/includes.chroot/opt/pot-system
          cp -r $GITHUB_WORKSPACE/pot-system/* config/includes.chroot/opt/pot-system/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/services/* config/includes.chroot/opt/pot-system/services/ 2>/dev/null || true

          # Setup hook
          mkdir -p config/hooks/live
          cp $GITHUB_WORKSPACE/config/hooks/30-pot-system.hook.chroot config/hooks/live/
          chmod +x config/hooks/live/*.chroot

          # Build
          sudo lb build 2>&1 | tee /tmp/build.log || true

          # Find ISO
          ls -la *.iso 2>/dev/null || echo "No ISO from lb build"

      - name: Check lb build result
        id: check_lb
        run: |
          ISO=$(find /tmp/lb -name "*.iso" 2>/dev/null | head -1)
          if [ -n "$ISO" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$ISO" >> $GITHUB_OUTPUT
            echo "lb build succeeded: $ISO"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "lb build failed, will try manual method"
          fi

      - name: Manual build (fallback if lb fails)
        if: steps.check_lb.outputs.found != 'true'
        run: |
          echo "=== Using manual debootstrap method ==="

          # Full debootstrap
          sudo debootstrap \
            --arch=amd64 \
            --include=systemd,systemd-sysv,dbus,udev,locales,ca-certificates,apt-utils,live-boot,live-boot-initramfs-tools,live-config,live-config-systemd \
            bookworm \
            /mnt/chroot \
            http://deb.debian.org/debian

          # APT sources
          sudo tee /mnt/chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          EOF

          # Mount
          sudo mount --bind /proc /mnt/chroot/proc
          sudo mount --bind /sys /mnt/chroot/sys
          sudo mount --bind /dev /mnt/chroot/dev
          sudo mount --bind /dev/pts /mnt/chroot/dev/pts

          # Install packages
          sudo chroot /mnt/chroot /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq 2>/dev/null
            apt-get install -y --no-install-recommends \
              linux-image-amd64 \
              grub-efi-amd64 \
              iproute2 iptables nftables net-tools \
              ppp pppoe dnsmasq chrony \
              nginx php8.2-fpm php8.2-cli php8.2-sqlite3 php8.2-mbstring sqlite3 \
              openssh-server curl wget sudo nano \
              usbutils pciutils tcpdump htop fail2ban frr \
              firmware-linux firmware-linux-nonfree firmware-realtek firmware-atheros \
              2>&1 | tail -10
          "

          # Configure live boot
          sudo chroot /mnt/chroot /bin/bash -c "
            mkdir -p /etc/live /lib/live/mount
            echo 'BOOT=live' > /etc/live/boot.conf
            update-initramfs -u -k all 2>&1 | tail -3
          "

          # Copy POT System files
          sudo mkdir -p /mnt/chroot/opt/pot-system
          sudo cp -r pot-system/* /mnt/chroot/opt/pot-system/ 2>/dev/null || true
          sudo cp -r services/* /mnt/chroot/opt/pot-system/services/ 2>/dev/null || true
          sudo find /mnt/chroot/opt/pot-system -name "*.sh" -exec chmod +x {} \;

          # Hostname and users
          echo "pot-router" | sudo tee /mnt/chroot/etc/hostname
          sudo chroot /mnt/chroot /bin/bash -c "
            echo 'root:admin' | chpasswd
            useradd -m -s /bin/bash -G sudo admin 2>/dev/null || true
            echo 'admin:admin' | chpasswd
          "

          # Network
          sudo tee /mnt/chroot/etc/network/interfaces << 'EOF'
          auto lo
          iface lo inet loopback
          auto eth0
          iface eth0 inet dhcp
          auto eth1
          iface eth1 inet static
            address 192.168.10.1
            netmask 255.255.255.0
          EOF

          # Unmount
          sudo umount /mnt/chroot/dev/pts || true
          sudo umount /mnt/chroot/dev || true
          sudo umount /mnt/chroot/sys || true
          sudo umount /mnt/chroot/proc || true

          # Create squashfs
          sudo mkdir -p /mnt/chroot/lib/live/mount
          sudo mksquashfs /mnt/chroot /tmp/filesystem.squashfs \
            -comp xz -noappend \
            -e /mnt/chroot/proc -e /mnt/chroot/sys -e /mnt/chroot/dev
          ls -lh /tmp/filesystem.squashfs

          # Build ISO structure
          mkdir -p /tmp/iso/live /tmp/iso/boot/grub
          cp /tmp/filesystem.squashfs /tmp/iso/live/

          KERNEL=$(ls /mnt/chroot/boot/vmlinuz-* 2>/dev/null | head -1)
          INITRD=$(ls /mnt/chroot/boot/initrd.img-* 2>/dev/null | head -1)
          echo "Kernel: $KERNEL | Initrd: $INITRD"
          cp "$KERNEL" /tmp/iso/boot/vmlinuz
          cp "$INITRD" /tmp/iso/boot/initrd.img

          cat > /tmp/iso/boot/grub/grub.cfg << 'GRUB'
          set default=0
          set timeout=5
          menuentry "POT System - PC Router OS" {
            linux /boot/vmlinuz boot=live components quiet
            initrd /boot/initrd.img
          }
          menuentry "POT System (nomodeset)" {
            linux /boot/vmlinuz boot=live components nomodeset
            initrd /boot/initrd.img
          }
          GRUB

          sudo grub-mkrescue --output=/tmp/pot-system-manual.iso /tmp/iso -- -volid "POT-SYSTEM"
          ls -lh /tmp/pot-system-manual.iso

      - name: Collect ISO
        run: |
          ISO_NAME="pot-system-1.0-$(date +%Y%m%d)-amd64.iso"

          # Try lb build ISO first
          LB_ISO=$(find /tmp/lb -name "*.iso" 2>/dev/null | head -1)
          MANUAL_ISO="/tmp/pot-system-manual.iso"

          if [ -f "$LB_ISO" ]; then
            echo "Using lb build ISO: $LB_ISO"
            cp "$LB_ISO" "./$ISO_NAME"
          elif [ -f "$MANUAL_ISO" ]; then
            echo "Using manual build ISO: $MANUAL_ISO"
            cp "$MANUAL_ISO" "./$ISO_NAME"
          else
            echo "ERROR: No ISO found!"
            tail -50 /tmp/build.log 2>/dev/null || true
            exit 1
          fi

          sha256sum "./$ISO_NAME" > "./$ISO_NAME.sha256"
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV
          ls -lh "./$ISO_NAME"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: pot-system-iso
          path: |
            *.iso
            *.sha256
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/build.log
          retention-days: 7

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
            *.sha256
          body: |
            ## POT System ${{ github.ref_name }}
            PC-Based Router / Firewall / Billing OS

            ### Flash with Rufus
            1. Download `.iso` below
            2. Rufus → Device: SSD → Select ISO
            3. Partition: **GPT** · Target: **UEFI**
            4. START → **DD Image mode**
            5. Boot → Web UI: `https://192.168.10.1`

            **Login:** admin / admin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
