name: Build POT System ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-utils \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            git \
            ca-certificates

      - name: Configure live-build
        run: |
          mkdir -p build
          cd build
          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --security false \
            --memtest none \
            --iso-volume "POT-SYSTEM-1.0" \
            --iso-publisher "POT System Project" \
            --iso-application "POT System - PC Router OS"

      - name: Copy package lists
        run: |
          mkdir -p build/config/package-lists
          cp config/packages.list.chroot build/config/package-lists/pot-system.list.chroot

      - name: Copy hooks (post-install scripts)
        run: |
          mkdir -p build/config/hooks/live
          cp -r config/hooks/* build/config/hooks/live/
          chmod +x build/config/hooks/live/*.chroot

      - name: Copy POT System web UI and services
        run: |
          # Web UI
          mkdir -p build/config/includes.chroot/opt/pot-system
          cp -r pot-system/* build/config/includes.chroot/opt/pot-system/

          # Scripts - make executable
          chmod +x build/config/includes.chroot/opt/pot-system/scripts/*.sh 2>/dev/null || true

          # Services (firstboot, billing scripts)
          mkdir -p build/config/includes.chroot/opt/pot-system/services
          cp -r services/* build/config/includes.chroot/opt/pot-system/services/ 2>/dev/null || true
          chmod +x build/config/includes.chroot/opt/pot-system/services/*.sh 2>/dev/null || true

          # Nginx webroot symlink setup
          mkdir -p build/config/includes.chroot/var/www/html
          mkdir -p build/config/includes.chroot/var/lib/pot-system

      - name: Build ISO
        run: |
          cd build
          sudo lb build 2>&1 | tee ../build.log
          echo "Build exit code: $?"

      - name: Check build output
        run: |
          ls -lh build/*.iso 2>/dev/null || echo "No ISO found in build/"
          ls -lh *.iso 2>/dev/null || echo "No ISO found in root"
          find build -name "*.iso" 2>/dev/null

      - name: Collect ISO
        run: |
          ISO_FILE=$(find build -name "*.iso" | head -1)
          if [ -z "$ISO_FILE" ]; then
            echo "ERROR: No ISO file found!"
            tail -100 build.log
            exit 1
          fi
          ISO_NAME="pot-system-1.0-$(date +%Y%m%d)-amd64.iso"
          cp "$ISO_FILE" "./${ISO_NAME}"
          echo "ISO_NAME=${ISO_NAME}" >> $GITHUB_ENV
          sha256sum "./${ISO_NAME}" > "./${ISO_NAME}.sha256"
          echo "ISO ready: ${ISO_NAME}"
          ls -lh "./${ISO_NAME}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: pot-system-iso
          path: |
            *.iso
            *.sha256
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
            *.sha256
          body: |
            ## POT System ${{ github.ref_name }}

            PC-Based Router / Firewall / Billing OS

            ### Flash Instructions (Rufus)
            1. Download the `.iso` file below
            2. Open **Rufus** → Select your SSD/USB
            3. Select the ISO → Partition scheme: **GPT** → Target: **UEFI**
            4. Click START → Choose **"Write in DD Image mode"**
            5. Boot from the SSD → POT System auto-configures on first boot

            ### Default Login
            - Web UI: `https://192.168.1.1`
            - Username: `admin` / Password: `admin`
            - SSH: `ssh admin@192.168.1.1`

            ### SHA256 Checksum
            See `.sha256` file to verify download integrity.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
