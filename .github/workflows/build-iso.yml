name: Build POT System ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            git \
            ca-certificates \
            isolinux \
            syslinux-utils

      - name: Setup live-build config
        run: |
          mkdir -p build
          cd build

          # Initialize lb config
          lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --bootloader grub-efi \
            --debian-installer none \
            --archive-areas "main contrib non-free non-free-firmware" \
            --apt-recommends false \
            --security false \
            --memtest none \
            --iso-volume "POT-SYSTEM" \
            --iso-application "POT System Router OS"

          # Disable security and backports repos to avoid failures
          echo "" > config/archives/security.list.chroot 2>/dev/null || true
          echo "" > config/archives/security.list.binary 2>/dev/null || true

      - name: Add package list
        run: |
          mkdir -p build/config/package-lists
          cp config/packages.list.chroot build/config/package-lists/pot-system.list.chroot

      - name: Add hooks
        run: |
          mkdir -p build/config/hooks/live
          for f in config/hooks/*.chroot; do
            cp "$f" build/config/hooks/live/
            chmod +x "build/config/hooks/live/$(basename $f)"
          done

      - name: Add POT System files
        run: |
          # Create directory structure inside chroot
          mkdir -p build/config/includes.chroot/opt/pot-system/webui
          mkdir -p build/config/includes.chroot/opt/pot-system/api
          mkdir -p build/config/includes.chroot/opt/pot-system/scripts
          mkdir -p build/config/includes.chroot/opt/pot-system/services
          mkdir -p build/config/includes.chroot/var/lib/pot-system
          mkdir -p build/config/includes.chroot/var/www/html

          # Copy web UI
          cp -r pot-system/webui/* build/config/includes.chroot/opt/pot-system/webui/ 2>/dev/null || true
          cp -r pot-system/api/* build/config/includes.chroot/opt/pot-system/api/ 2>/dev/null || true

          # Copy scripts
          cp -r pot-system/scripts/* build/config/includes.chroot/opt/pot-system/scripts/ 2>/dev/null || true
          cp -r services/* build/config/includes.chroot/opt/pot-system/services/ 2>/dev/null || true

          # Make scripts executable
          find build/config/includes.chroot/opt/pot-system -name "*.sh" -exec chmod +x {} \;

      - name: Build ISO
        run: |
          cd build
          sudo lb build 2>&1 | tee ../build.log || true
          echo "=== Build finished ==="

      - name: Find ISO file
        id: find_iso
        run: |
          echo "=== Searching for ISO ==="
          find . -name "*.iso" -ls 2>/dev/null || echo "No ISO found anywhere"
          find build -name "*.hybrid.iso" -ls 2>/dev/null || true

          ISO=$(find build -name "*.iso" 2>/dev/null | head -1)
          if [ -n "$ISO" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$ISO" >> $GITHUB_OUTPUT
            echo "ISO found: $ISO"
            ls -lh "$ISO"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "ISO NOT found - showing last 50 lines of build log:"
            tail -50 build.log
          fi

      - name: Package ISO
        if: steps.find_iso.outputs.found == 'true'
        run: |
          ISO="${{ steps.find_iso.outputs.path }}"
          NAME="pot-system-1.0-$(date +%Y%m%d)-amd64.iso"
          cp "$ISO" "./$NAME"
          sha256sum "./$NAME" > "./$NAME.sha256"
          echo "ISO_NAME=$NAME" >> $GITHUB_ENV
          ls -lh "./$NAME"

      - name: Upload ISO
        if: steps.find_iso.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pot-system-iso
          path: |
            *.iso
            *.sha256
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Fail if no ISO
        if: steps.find_iso.outputs.found != 'true'
        run: |
          echo "Build failed - no ISO produced"
          exit 1

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && steps.find_iso.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
            *.sha256
          body: |
            ## POT System ${{ github.ref_name }}
            PC-Based Router / Firewall / Billing OS

            ### Flash with Rufus
            1. Download `.iso` below
            2. Open Rufus → Device: your SSD → Select ISO
            3. Partition: GPT · Target: UEFI
            4. START → **DD Image mode**
            5. Boot from SSD → Web UI at `https://192.168.1.1`

            **Default login:** admin / admin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
